<style>
  :root {

    display: flex;
    flex-direction: column;
    box-shadow: 0 18px 64px rgba(0,0,0,0.45);
  }
  .graph-overlay-header {
    height: 42px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    background: #0a0d14;
    color: var(--text);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .graph-overlay-frame {
    width: 100%;
    height: 100%;
    border: 0;
    background: #05070c;
    flex: 1;
  }

  .typing {
    display: inline-flex; gap: 4px; padding: 10px 14px; align-self: flex-start;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; }
  .empty-state-icon { font-size: 24px; margin-bottom: 8px; }

  .budget-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); font-size: 11px;
  }
  .budget-label { color: var(--text-dim); font-weight: 500; white-space: nowrap; }
  .budget-track {
    flex: 1; height: 8px; background: var(--surface2);
    border-radius: 4px; overflow: hidden;
  }
  .budget-fill {
    height: 100%; width: 0%; border-radius: 4px;
    background: #6ae276; transition: width 0.4s, background 0.4s;
  }
  .budget-fill.warn { background: var(--amber); }
  .budget-fill.critical { background: var(--red); }
  .budget-text { color: var(--text-dim); font-family: var(--font); white-space: nowrap; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>
    <img class="header-logo" src="/core-memory-banner.svg" alt="Core Memory">
    <span class="header-title-tail">Live Demo</span>
  </h1>
  <div class="header-controls">
    <div class="session-chip-wrap">
      <button class="session-badge session-badge-btn" id="session-badge" type="button" style="cursor:pointer;user-select:none">session: --- ▾</button>
      <div class="session-popover" id="session-popover">
        <div class="session-pop-title">Session Controls</div>
        <label class="session-pop-check" title="Resets session before each seed run so replay starts at turn 1 in a clean session.">
          <input id="seed-reset-before-run" type="checkbox" checked>
          <span>Start fresh session before Seed</span>
        </label>
        <label class="session-pop-check" title="Also clears demo memory store before seeding.">
          <input id="seed-wipe-memory" type="checkbox">
          <span>Clear memory store too</span>
        </label>
        <label class="session-pop-check" title="When enabled, each Seed run resumes story-pack replay from the next unseeded turn.">
          <input id="seed-continue-story" type="checkbox" checked>
          <span>Continue story-pack from last turn</span>
        </label>
        <div id="story-cursor-label" style="font-size:11px;color:var(--text-dim);margin:-2px 0 8px 0;">Story cursor: turn 0</div>
        <div class="session-pop-actions">
          <button class="btn" id="btn-session-new" type="button">New Session Now</button>
          <button class="btn btn-warn" id="btn-session-hard-reset" type="button">Hard Reset Now</button>
          <button class="btn" id="btn-story-cursor-reset" type="button">Reset Story Cursor</button>
        </div>
      </div>
    </div>
    <button class="btn" id="auth-btn" type="button" style="display:none">Sign in</button>
    <span class="auth-status" id="auth-status" style="display:none"></span>
    <label class="control-inline" title="Pick a model for chat turns (auto chooses by available credentials).">
      <span class="control-label" style="margin-right:0">model</span>
      <select id="model-select" class="control-select">
        <option value="">auto</option>
      </select>
    </label>
    <button class="btn btn-warn" id="btn-flush-session">Flush Session</button>
    <button class="btn" id="btn-open-graph">Graph View</button>
  </div>
</header>

<div class="budget-bar">
  <div class="budget-label">Context Window</div>
  <div class="budget-track">
    <div class="budget-fill" id="budget-fill"></div>
  </div>
  <div class="budget-text" id="budget-text">0 / 10,000 tokens</div>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Type a message..." autofocus>
      <button class="btn btn-accent" id="btn-send-message">Send</button>
    </div>
  </div>

  <div class="inspector">
    <div class="inspector-tabs">
      <div class="control-panel-title">Control Panel</div>
      <select id="tab-selector" class="tab-selector">
        <option value="beads" selected>Beads</option>
        <option value="associations">Associations</option>
        <option value="claims">Claims</option>
        <option value="entities">Entities</option>
        <option value="runtime">Runtime</option>
        <option value="benchmark">Benchmark</option>
        <option value="rolling">Rolling Window</option>
      </select>
    </div>
    <div class="inspector-body">
      <div class="tab-content active" id="tab-beads"></div>
      <div class="tab-content" id="tab-associations"></div>
      <div class="tab-content" id="tab-graph"></div>
      <div class="tab-content" id="tab-claims"></div>
      <div class="tab-content" id="tab-entities"></div>
      <div class="tab-content" id="tab-runtime">
        <div class="panel-controls" id="runtime-controls">
          <span class="control-label">subset</span>
          <select id="bench-subset" class="control-select" title="Benchmark subset">
            <option value="local" selected>local</option>
            <option value="full">full</option>
          </select>
          <span class="control-label">semantic</span>
          <select id="bench-semantic" class="control-select" title="Semantic mode">
            <option value="required" selected>required</option>
            <option value="degraded_allowed">degraded_allowed</option>
          </select>
          <span class="control-label">myelination</span>
          <select id="bench-myelination" class="control-select" title="Myelination mode">
            <option value="off" selected>off</option>
            <option value="on">on</option>
            <option value="compare">compare</option>
          </select>
        </div>
        <div id="tab-runtime-content"></div>
      </div>
      <div class="tab-content" id="tab-benchmark">
        <div class="panel-controls" id="benchmark-controls">
          <span class="control-label">root</span>
          <select id="bench-root-mode" class="control-select" title="Benchmark isolation mode">
            <option value="snapshot" selected>snapshot</option>
            <option value="clean">clean</option>
          </select>
          <span class="control-label">preload</span>
          <input id="bench-preload-max" class="control-input" type="number" min="0" step="50" value="200" style="width:74px" title="Max demo turns to preload">
          <label class="control-inline" title="Preload turns from demo session">
            <input id="bench-preload-enabled" type="checkbox" checked>
            <span class="control-label" style="margin-right:0">from demo</span>
          </label>
          <button class="btn" id="btn-seed">Seed</button>
          <button class="btn" id="btn-benchmark">Run LOCOMO Test</button>
        </div>
        <div id="tab-benchmark-content"></div>
      </div>
      <div class="tab-content" id="tab-rolling"></div>
    </div>
    <div class="stats-bar">
      <span>Beads: <span class="stat-val" id="stat-beads">0</span></span>
      <span>Assoc: <span class="stat-val" id="stat-assoc">0</span></span>
      <span>Claims: <span class="stat-val" id="stat-claims">0</span></span>
      <span>Entities: <span class="stat-val" id="stat-entities">0</span></span>
      <span>Window: <span class="stat-val" id="stat-rolling">0</span></span>
      <span style="margin-left:auto">Window: <span class="stat-val" id="stat-tokens">0</span>/<span id="stat-budget">10000</span></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-btn" id="btn-modal-close">&times;</button>
    <h3 id="modal-title">Bead Detail</h3>
    <pre id="modal-body"></pre>
  </div>
</div>

<div class="graph-overlay" id="graph-overlay">
  <div class="graph-overlay-panel">
    <div class="graph-overlay-header">
      <span>Causal Graph</span>
      <button class="btn btn-warn" id="btn-close-graph-overlay" type="button">Close</button>
    </div>
    <iframe class="graph-overlay-frame" id="graph-overlay-frame" title="Core Memory Causal Graph"></iframe>
  </div>
</div>

<script src="/chat-app.js?v=20260420-auth-session-9"></script>
</body>
</html>
