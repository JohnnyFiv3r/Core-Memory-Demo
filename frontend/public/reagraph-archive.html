<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const q = (params.get('api_base') || '').trim();
  let s = '';
  try { s = (localStorage.getItem('CORE_MEMORY_API_BASE') || '').trim(); } catch {}
  const defaultApiBase = window.location.hostname === 'demo.usecorememory.com'
    ? 'https://core-memory-demo.onrender.com'
    : '';
  const apiBase = (q || s || defaultApiBase || '').replace(/\/+$/, '');
  if (apiBase) {
    try { localStorage.setItem('CORE_MEMORY_API_BASE', apiBase); } catch {}
  }
  const nativeFetch = window.fetch.bind(window);
  window.fetch = (input, init) => {
    if (apiBase && typeof input === 'string' && input.startsWith('/')) {
      input = apiBase + input;
    }
    return nativeFetch(input, init);
  };
  window.__CORE_MEMORY_API_BASE = apiBase;
})();
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Core Memory Reagraph Archive</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2d3148;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c7eff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .title {
    font-size: 14px;
    font-weight: 600;
  }
  .title span { color: var(--accent); }
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .controls label {
    font-size: 11px;
    color: var(--text-dim);
  }
  select, input {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 12px;
  }
  button {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 10px;
    padding: 10px;
    height: calc(100vh - 54px);
  }
  .panel {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    overflow: hidden;
    min-height: 0;
  }
  #graph-host {
    width: 100%;
    height: 100%;
  }
  .side {
    display: flex;
    flex-direction: column;
  }
  .meta {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
  }
  .detail {
    flex: 1;
    overflow: auto;
    padding: 10px;
  }
  pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 11px;
    color: var(--text-dim);
  }
  .hint {
    padding: 10px;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
  <header>
    <div class="title"><span>Core Memory</span> Reagraph Archive Viewer</div>
    <div class="controls">
      <label>relation</label>
      <select id="rel-filter"><option value="all">all</option></select>
      <label>min conf</label>
      <input id="conf-filter" type="number" min="0" max="1" step="0.05" value="0" style="width:78px" />
      <label>search</label>
      <input id="search-filter" type="text" placeholder="node/edge" style="width:140px" />
      <label><input id="auto-refresh" type="checkbox" checked /> auto</label>
      <button id="refresh-btn" type="button">Refresh</button>
      <button id="fit-btn" type="button">Fit</button>
      <button id="open-demo-btn" type="button" onclick="goBackToDemo()">Back to Demo</button>
    </div>
  </header>
  <div class="layout">
    <div class="panel"><div id="graph-host"></div></div>
    <div class="panel side">
      <div class="meta" id="meta">loading...</div>
      <div class="detail"><pre id="detail">Select a node or edge.</pre></div>
      <div class="hint">This page renders from the demo bead archive via <code>/v1/memory/inspect/state</code>.</div>
    </div>
  </div>

<script>
const REAGRAPH_RUNTIMES = [
  {
    name: 'esm.sh',
    react: 'https://esm.sh/react@18.3.1',
    dom: 'https://esm.sh/react-dom@18.3.1/client',
    reagraph: 'https://esm.sh/reagraph@4.30.8?bundle&deps=react@18.3.1,react-dom@18.3.1',
  },
  {
    name: 'jsdelivr',
    react: 'https://cdn.jsdelivr.net/npm/react@19.2.4/+esm',
    dom: 'https://cdn.jsdelivr.net/npm/react-dom@19.2.4/client/+esm',
    reagraph: 'https://cdn.jsdelivr.net/npm/reagraph@4.30.8/+esm',
  },
];

const host = document.getElementById('graph-host');
const detailEl = document.getElementById('detail');
const metaEl = document.getElementById('meta');
const relFilterEl = document.getElementById('rel-filter');
const confFilterEl = document.getElementById('conf-filter');
const searchFilterEl = document.getElementById('search-filter');
const autoRefreshEl = document.getElementById('auto-refresh');
const refreshBtn = document.getElementById('refresh-btn');
const fitBtn = document.getElementById('fit-btn');
const openDemoBtn = document.getElementById('open-demo-btn');

let runtimePromise = null;
let runtime = null;
let runtimeName = '';
let runtimeError = null;
let graphRoot = null;
let graphRef = null;
let beads = [];
let associations = [];
let refreshTimer = null;
let lastGraph = { nodes: [], edges: [] };

const theme = {
  canvas: { background: '#060a16' },
  node: {
    fill: '#7ca0ab',
    activeFill: '#6c7eff',
    opacity: 0.95,
    selectedOpacity: 1,
    inactiveOpacity: 0.2,
    label: { color: '#e1e4ed', stroke: '#060a16', activeColor: '#ffffff' },
    subLabel: { color: '#8b8fa3', stroke: 'transparent', activeColor: '#e1e4ed' },
  },
  edge: {
    fill: '#5b6a8a',
    activeFill: '#8ea2ff',
    opacity: 0.7,
    selectedOpacity: 1,
    inactiveOpacity: 0.2,
    label: { color: '#b8c0d8', stroke: '#060a16', activeColor: '#ffffff' },
  },
  lasso: { border: '1px solid #6c7eff', background: 'rgba(108,126,255,0.15)' },
  ring: { fill: '#1f2838', activeFill: '#6c7eff' },
};

function typeColor(type) {
  const t = String(type || '').toLowerCase();
  if (t === 'decision') return '#6c7eff';
  if (t === 'evidence') return '#22d3ee';
  if (t === 'lesson') return '#4ade80';
  if (t === 'goal') return '#fbbf24';
  if (t === 'outcome') return '#f87171';
  if (t === 'context') return '#8b8fa3';
  return '#7ca0ab';
}

function normEdgeRows(rows) {
  return (rows || []).map((r, idx) => {
    const src = String((r || {}).source_bead || '').trim();
    const dst = String((r || {}).target_bead || '').trim();
    if (!src || !dst) return null;
    return {
      id: String((r || {}).id || ('edge-' + idx + '-' + src.slice(0, 6) + '-' + dst.slice(0, 6))),
      source: src,
      target: dst,
      relationship: String((r || {}).relationship || 'associated_with'),
      confidence: Number((r || {}).confidence || 0),
      reason_text: String((r || {}).explanation || ''),
    };
  }).filter(Boolean);
}

function beadMapFromRows(rows) {
  const out = {};
  (rows || []).forEach((b) => {
    const id = String((b || {}).id || '').trim();
    if (!id) return;
    out[id] = b;
  });
  return out;
}

function updateRelationOptions(edges) {
  const current = String(relFilterEl.value || 'all');
  const rels = Array.from(new Set((edges || []).map((e) => String(e.relationship || 'associated_with')))).sort();
  relFilterEl.innerHTML = '';
  const allOpt = document.createElement('option');
  allOpt.value = 'all';
  allOpt.textContent = 'all';
  relFilterEl.appendChild(allOpt);
  rels.forEach((rel) => {
    const opt = document.createElement('option');
    opt.value = rel;
    opt.textContent = rel;
    relFilterEl.appendChild(opt);
  });
  if (current === 'all' || rels.includes(current)) relFilterEl.value = current;
  else relFilterEl.value = 'all';
}

function buildGraphData() {
  const beadMap = beadMapFromRows(beads);
  const edgesRaw = normEdgeRows(associations);
  const rel = String(relFilterEl.value || 'all');
  const minConf = Number(confFilterEl.value || 0);
  const search = String(searchFilterEl.value || '').trim().toLowerCase();

  const edges = edgesRaw.filter((e) => {
    if (rel !== 'all' && e.relationship !== rel) return false;
    if (Number.isFinite(minConf) && e.confidence < minConf) return false;
    if (!search) return true;
    const srcTitle = String(((beadMap[e.source] || {}).title || e.source) || '').toLowerCase();
    const dstTitle = String(((beadMap[e.target] || {}).title || e.target) || '').toLowerCase();
    const hay = [srcTitle, dstTitle, String(e.relationship || '').toLowerCase(), String(e.reason_text || '').toLowerCase()].join(' ');
    return hay.includes(search);
  });

  const ids = new Set();
  const degree = {};
  edges.forEach((e) => {
    ids.add(e.source);
    ids.add(e.target);
    degree[e.source] = Number(degree[e.source] || 0) + 1;
    degree[e.target] = Number(degree[e.target] || 0) + 1;
  });

  const nodes = Array.from(ids).map((id) => {
    const bead = beadMap[id] || {};
    const d = Number(degree[id] || 1);
    return {
      id,
      label: String(bead.title || id),
      size: Math.max(3, Math.min(14, 4 + (d * 1.1))),
      fill: typeColor(bead.type),
      data: {
        bead_id: id,
        title: bead.title,
        type: bead.type,
        status: bead.status,
        source_turn_ids: bead.source_turn_ids || [],
      },
    };
  });

  const graphEdges = edges.map((e) => ({
    id: e.id,
    source: e.source,
    target: e.target,
    label: e.relationship,
    size: 0.5 + (Math.max(0, Math.min(1, Number(e.confidence || 0))) * 2.2),
    data: {
      relationship: e.relationship,
      confidence: e.confidence,
      reason_text: e.reason_text,
    },
  }));

  const renderer = runtime ? ('Reagraph (' + runtimeName + ')') : 'SVG fallback';
  metaEl.textContent =
    'renderer=' + renderer +
    ' · session beads=' + String(beads.length) +
    ' · associations=' + String(edgesRaw.length) +
    ' · showing nodes=' + String(nodes.length) +
    ' edges=' + String(graphEdges.length);

  return { nodes, edges: graphEdges };
}

async function showNodeDetailById(beadId) {
  const id = String(beadId || '').trim();
  if (!id) return;
  try {
    const res = await fetch('/v1/memory/inspect/beads/' + encodeURIComponent(id));
    const data = await res.json();
    detailEl.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    detailEl.textContent = JSON.stringify({ error: String(err && err.message || err), bead_id: id }, null, 2);
  }
}

async function showNodeDetail(node) {
  const beadId = String((node && (node.id || (node.data || {}).bead_id)) || '').trim();
  if (!beadId) return;
  await showNodeDetailById(beadId);
}

function showEdgeDetail(edge) {
  detailEl.textContent = JSON.stringify({
    source: edge && edge.source,
    target: edge && edge.target,
    relationship: edge && (edge.label || (edge.data || {}).relationship),
    confidence: edge && ((edge.data || {}).confidence),
    reason_text: edge && ((edge.data || {}).reason_text),
  }, null, 2);
}

async function ensureReagraphRuntime() {
  if (runtime) return runtime;
  if (runtimePromise) return runtimePromise;
  runtimePromise = (async () => {
    let lastErr = null;
    for (const cand of REAGRAPH_RUNTIMES) {
      try {
        const [reactMod, domMod, reagraphMod] = await Promise.all([
          import(cand.react),
          import(cand.dom),
          import(cand.reagraph),
        ]);
        const React = reactMod && (reactMod.default || reactMod);
        const createRoot = domMod && domMod.createRoot;
        const GraphCanvas = reagraphMod && reagraphMod.GraphCanvas;
        if (!React || !createRoot || !GraphCanvas) {
          throw new Error('reagraph_runtime_missing_exports_' + cand.name);
        }
        runtime = { React, createRoot, GraphCanvas };
        runtimeName = cand.name;
        graphRoot = createRoot(host);
        return runtime;
      } catch (err) {
        lastErr = err;
      }
    }
    runtimeError = lastErr || new Error('reagraph_runtime_unavailable');
    return null;
  })();
  return runtimePromise;
}

function renderGraphSvg(graph) {
  host.innerHTML = '';
  const svgNs = 'http://www.w3.org/2000/svg';
  const width = Math.max(720, host.clientWidth || 720);
  const height = Math.max(520, host.clientHeight || 520);
  const svg = document.createElementNS(svgNs, 'svg');
  svg.setAttribute('width', String(width));
  svg.setAttribute('height', String(height));
  svg.setAttribute('viewBox', '0 0 ' + String(width) + ' ' + String(height));
  svg.style.background = '#060a16';
  svg.style.display = 'block';

  const nodes = (graph.nodes || []).slice(0, 180);
  const keep = new Set(nodes.map((n) => String(n.id)));
  const edges = (graph.edges || []).filter((e) => keep.has(String(e.source)) && keep.has(String(e.target))).slice(0, 420);

  const cx = width / 2;
  const cy = height / 2;
  const radius = Math.max(120, Math.min(width, height) * 0.38);
  const pos = {};
  nodes.forEach((n, i) => {
    const a = (2 * Math.PI * i) / Math.max(1, nodes.length);
    pos[n.id] = { x: cx + Math.cos(a) * radius, y: cy + Math.sin(a) * radius };
  });

  edges.forEach((e) => {
    const s = pos[e.source];
    const t = pos[e.target];
    if (!s || !t) return;
    const line = document.createElementNS(svgNs, 'line');
    line.setAttribute('x1', String(s.x));
    line.setAttribute('y1', String(s.y));
    line.setAttribute('x2', String(t.x));
    line.setAttribute('y2', String(t.y));
    line.setAttribute('stroke', '#4e5f7c');
    line.setAttribute('stroke-opacity', '0.65');
    line.setAttribute('stroke-width', String(Math.max(0.6, Number(e.size || 1))));
    line.style.cursor = 'pointer';
    line.addEventListener('click', () => showEdgeDetail(e));
    svg.appendChild(line);
  });

  nodes.forEach((n) => {
    const p = pos[n.id];
    if (!p) return;
    const g = document.createElementNS(svgNs, 'g');
    g.style.cursor = 'pointer';

    const c = document.createElementNS(svgNs, 'circle');
    c.setAttribute('cx', String(p.x));
    c.setAttribute('cy', String(p.y));
    c.setAttribute('r', String(Math.max(4, Math.min(12, Number(n.size || 5)))));
    c.setAttribute('fill', String(n.fill || '#7ca0ab'));
    c.setAttribute('stroke', '#0f1117');
    c.setAttribute('stroke-width', '1.2');
    g.appendChild(c);

    const t = document.createElementNS(svgNs, 'text');
    t.setAttribute('x', String(p.x + 7));
    t.setAttribute('y', String(p.y - 7));
    t.setAttribute('fill', '#d8dbe6');
    t.setAttribute('font-size', '10');
    t.textContent = String(n.label || n.id || '').slice(0, 42);
    g.appendChild(t);

    g.addEventListener('click', () => showNodeDetailById(n.id));
    svg.appendChild(g);
  });

  host.appendChild(svg);
}

function renderGraph() {
  const graph = buildGraphData();
  lastGraph = graph;

  if (runtime && graphRoot && runtime.GraphCanvas && runtime.React) {
    graphRoot.render(
      runtime.React.createElement(runtime.GraphCanvas, {
        ref: (r) => { graphRef = r; },
        nodes: graph.nodes,
        edges: graph.edges,
        layoutType: 'forceDirected3d',
        cameraMode: 'orbit',
        draggable: true,
        animated: true,
        labelType: 'all',
        edgeLabelPosition: 'inline',
        theme,
        onNodeClick: showNodeDetail,
        onEdgeClick: showEdgeDetail,
      })
    );
    return;
  }

  renderGraphSvg(graph);
}

async function refreshData() {
  metaEl.textContent = 'loading data...';
  await ensureReagraphRuntime();

  let data = null;
  let lastErr = null;
  for (const stateUrl of ['/v1/memory/inspect/state', '/api/demo/state']) {
    try {
      const res = await fetch(stateUrl);
      const body = await res.json();
      if (!res.ok) throw new Error(body && body.error ? String(body.error) : ('HTTP ' + res.status));
      data = body;
      break;
    } catch (err) {
      lastErr = err;
    }
  }
  if (!data) throw (lastErr || new Error('state_fetch_failed'));

  const mem = data.memory || {};
  beads = Array.isArray(mem.beads) ? mem.beads : [];
  associations = Array.isArray(mem.associations) ? mem.associations : [];
  updateRelationOptions(normEdgeRows(associations));
  renderGraph();

  if (!runtime && runtimeError) {
    detailEl.textContent = 'Reagraph runtime failed from all CDNs, showing SVG fallback.\n\n' + String(runtimeError && (runtimeError.stack || runtimeError.message) || runtimeError);
  }
}

function setupAutoRefresh() {
  if (refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
  if (autoRefreshEl.checked) {
    refreshTimer = setInterval(() => {
      refreshData().catch((err) => {
        metaEl.textContent = 'refresh error: ' + String(err && err.message || err);
        detailEl.textContent = 'Runtime error while refreshing graph. Check api_base and CDN access.\n\n' + String(err && err.stack || err);
      });
    }, 4000);
  }
}

refreshBtn.addEventListener('click', () => {
  refreshData().catch((err) => {
    metaEl.textContent = 'refresh error: ' + String(err && err.message || err);
    detailEl.textContent = 'Runtime error while refreshing graph. Check api_base and CDN access.\n\n' + String(err && err.stack || err);
  });
});

fitBtn.addEventListener('click', () => {
  try {
    if (runtime && graphRef && typeof graphRef.fitNodesInView === 'function') {
      graphRef.fitNodesInView();
      return;
    }
    renderGraphSvg(lastGraph);
  } catch (_) {}
});

openDemoBtn.addEventListener('click', () => {
  goBackToDemo();
});

function goBackToDemo() {
  const abs = new URL('./', window.location.href).toString();
  window.location.assign(abs);
}
window.goBackToDemo = goBackToDemo;

[relFilterEl, confFilterEl, searchFilterEl].forEach((el) => {
  el.addEventListener('change', () => renderGraph());
  el.addEventListener('input', () => renderGraph());
});

autoRefreshEl.addEventListener('change', setupAutoRefresh);

refreshData().catch((err) => {
  metaEl.textContent = 'load error: ' + String(err && err.message || err);
  detailEl.textContent = 'Failed to initialize graph runtime.\n\n' + String(err && err.stack || err);
});
setupAutoRefresh();
</script>
</body>
</html>
