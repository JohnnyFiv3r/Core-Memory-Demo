services:
  - type: web
    name: core-memory-demo-backend
    env: python
    rootDir: backend
    plan: starter
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    numInstances: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGIN
        sync: false
      - key: CORE_MEMORY_ROOT
        value: /var/data/core-memory
      - key: CORE_MEMORY_DEMO_BENCHMARK_ROOT
        value: /var/data/core-memory-bench
      - key: CORE_MEMORY_DEMO_ARTIFACTS_ROOT
        value: /var/data/core-memory-artifacts
      - key: DEMO_CONTEXT_BUDGET
        value: "10000"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

disks:
  - name: core-memory-demo-data
    mountPath: /var/data
    sizeGB: 20
